openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: PayLite payment platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: auth
    description: Merchant authentication
  - name: merchant
    description: Merchant profile and KYC
  - name: orders
    description: Payment orders
  - name: refunds
    description: Refund operations
  - name: webhook
    description: Provider webhook receiver
  - name: merchantWebhooks
    description: Merchant outbound webhooks
  - name: dashboard
    description: Dashboard analytics
  - name: health
    description: Health operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/csrf:
    get:
      operationId: getCsrfToken
      tags: [auth]
      summary: Issue a CSRF token cookie + value
      responses:
        "200":
          description: CSRF token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfTokenResponse"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new merchant account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login as a merchant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Clear the auth cookie
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOk"

  /merchant/me:
    get:
      operationId: getMe
      tags: [merchant]
      summary: Get current merchant profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchant/kyc:
    put:
      operationId: updateKyc
      tags: [merchant]
      summary: Update merchant KYC details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycUpdateRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchant/webhooks:
    get:
      operationId: listMerchantWebhooks
      tags: [merchantWebhooks]
      summary: List the merchant's outbound webhooks
      responses:
        "200":
          description: Webhook list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MerchantWebhook"
    post:
      operationId: createMerchantWebhook
      tags: [merchantWebhooks]
      summary: Register a new outbound webhook URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMerchantWebhookRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantWebhookWithSecret"

  /merchant/webhooks/{webhookId}:
    delete:
      operationId: deleteMerchantWebhook
      tags: [merchantWebhooks]
      summary: Delete an outbound webhook
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOk"

  /merchant/webhooks/{webhookId}/test:
    post:
      operationId: testMerchantWebhook
      tags: [merchantWebhooks]
      summary: Send a test event to the registered webhook
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTestResponse"

  /merchant/webhooks/logs:
    get:
      operationId: listWebhookLogs
      tags: [merchantWebhooks]
      summary: Recent outbound webhook delivery attempts
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookLog"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders for the current merchant (filterable)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, SUCCESS, FAILED, EXPIRED]
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/export:
    get:
      operationId: exportOrders
      tags: [orders]
      summary: Export filtered orders as CSV
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [PENDING, SUCCESS, FAILED, EXPIRED]
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: CSV stream
          content:
            text/csv:
              schema:
                type: string

  /orders/create:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new payment order and generate a UPI QR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "200":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderResult"

  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a public payment page snapshot for an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicOrder"

  /orders/{orderId}/simulate:
    post:
      operationId: simulatePayment
      tags: [orders]
      summary: Simulate a payment outcome (dev tool, triggers webhook)
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulatePaymentRequest"
      responses:
        "200":
          description: Simulated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulatePaymentResult"

  /orders/{orderId}/refund:
    post:
      operationId: refundOrder
      tags: [refunds]
      summary: Initiate a refund for a successful order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundRequest"
      responses:
        "200":
          description: Refund initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundResponse"

  /webhook:
    post:
      operationId: providerWebhook
      tags: [webhook]
      summary: Webhook endpoint for the payment provider
      parameters:
        - name: x-signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"

  /dashboard/summary:
    get:
      operationId: dashboardSummary
      tags: [dashboard]
      summary: Headline metrics for the merchant dashboard
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/timeseries:
    get:
      operationId: dashboardTimeseries
      tags: [dashboard]
      summary: Daily revenue and volume for the past N days
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 90
            default: 14
      responses:
        "200":
          description: Time series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeseriesPoint"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    SimpleOk:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    CsrfTokenResponse:
      type: object
      required: [csrfToken]
      properties:
        csrfToken:
          type: string

    SignupRequest:
      type: object
      required: [name, email, password, businessName]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        businessName:
          type: string
          minLength: 2

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [merchant]
      properties:
        merchant:
          $ref: "#/components/schemas/Merchant"

    Merchant:
      type: object
      required:
        - id
        - name
        - email
        - businessName
        - kycStatus
        - approved
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        businessName:
          type: string
        pan:
          type: string
          nullable: true
        bankAccount:
          type: string
          nullable: true
        ifsc:
          type: string
          nullable: true
        kycStatus:
          type: string
          enum: [PENDING, SUBMITTED, VERIFIED]
        approved:
          type: boolean
        createdAt:
          type: string
          format: date-time

    KycUpdateRequest:
      type: object
      required: [pan, bankAccount, ifsc]
      properties:
        pan:
          type: string
          minLength: 5
        bankAccount:
          type: string
          minLength: 6
        ifsc:
          type: string
          minLength: 6

    CreateOrderRequest:
      type: object
      required: [orderId, amount]
      properties:
        orderId:
          type: string
          description: Merchant's reference id
          minLength: 1
        amount:
          type: number
          minimum: 1
        customerName:
          type: string
        customerEmail:
          type: string
        note:
          type: string

    CreateOrderResult:
      type: object
      required: [order, qrString, qrImage, paymentUrl, expiresAt]
      properties:
        order:
          $ref: "#/components/schemas/Order"
        qrString:
          type: string
        qrImage:
          type: string
          description: Data URL PNG of the QR
        paymentUrl:
          type: string
        expiresAt:
          type: string
          format: date-time

    Order:
      type: object
      required:
        - id
        - merchantId
        - orderId
        - amount
        - status
        - provider
        - fraudFlag
        - createdAt
        - expiresAt
      properties:
        id:
          type: string
        merchantId:
          type: string
        orderId:
          type: string
        txnId:
          type: string
          nullable: true
        provider:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [PENDING, SUCCESS, FAILED, EXPIRED]
        customerName:
          type: string
          nullable: true
        customerEmail:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        qrString:
          type: string
          nullable: true
        fraudFlag:
          type: boolean
        fraudReason:
          type: string
          nullable: true
        refundStatus:
          type: string
          nullable: true
          enum: [INITIATED, SUCCESS, FAILED, null]
        refundAmount:
          type: number
          nullable: true
        refundedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
          nullable: true

    PublicOrder:
      type: object
      required:
        - id
        - orderId
        - amount
        - status
        - businessName
        - qrString
        - qrImage
        - createdAt
        - expiresAt
      properties:
        id:
          type: string
        orderId:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [PENDING, SUCCESS, FAILED, EXPIRED]
        businessName:
          type: string
        qrString:
          type: string
        qrImage:
          type: string
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    SimulatePaymentRequest:
      type: object
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: [SUCCESS, FAILED]

    SimulatePaymentResult:
      type: object
      required: [ok, status]
      properties:
        ok:
          type: boolean
        status:
          type: string

    RefundRequest:
      type: object
      properties:
        amount:
          type: number
          description: Optional partial refund amount; defaults to full order amount
          minimum: 1

    RefundResponse:
      type: object
      required: [orderId, refundStatus, refundAmount]
      properties:
        orderId:
          type: string
        refundStatus:
          type: string
          enum: [INITIATED, SUCCESS, FAILED]
        refundAmount:
          type: number

    WebhookPayload:
      type: object
      required: [txnId, status]
      properties:
        txnId:
          type: string
        status:
          type: string
          enum: [SUCCESS, FAILED]
        amount:
          type: number

    WebhookAck:
      type: object
      required: [received]
      properties:
        received:
          type: boolean
        status:
          type: string

    CreateMerchantWebhookRequest:
      type: object
      required: [webhookUrl]
      properties:
        webhookUrl:
          type: string
          format: uri
          minLength: 8

    MerchantWebhook:
      type: object
      required: [id, webhookUrl, enabled, secretMasked, createdAt]
      properties:
        id:
          type: string
        webhookUrl:
          type: string
        enabled:
          type: boolean
        secretMasked:
          type: string
          description: Masked secret, e.g. "whsec_••••abcd"
        createdAt:
          type: string
          format: date-time

    MerchantWebhookWithSecret:
      type: object
      required: [id, webhookUrl, enabled, webhookSecret, createdAt]
      properties:
        id:
          type: string
        webhookUrl:
          type: string
        enabled:
          type: boolean
        webhookSecret:
          type: string
          description: Returned only once at creation
        createdAt:
          type: string
          format: date-time

    WebhookTestResponse:
      type: object
      required: [ok, status]
      properties:
        ok:
          type: boolean
        status:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true

    WebhookLog:
      type: object
      required: [id, orderId, attempt, status, createdAt]
      properties:
        id:
          type: string
        orderId:
          type: string
        merchantWebhookId:
          type: string
          nullable: true
        attempt:
          type: integer
        status:
          type: string
        responseCode:
          type: integer
          nullable: true
        responseBody:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    DashboardSummary:
      type: object
      required:
        - totalOrders
        - successCount
        - failedCount
        - pendingCount
        - totalRevenue
        - successRate
        - todayRevenue
      properties:
        totalOrders:
          type: integer
        successCount:
          type: integer
        failedCount:
          type: integer
        pendingCount:
          type: integer
        totalRevenue:
          type: number
        successRate:
          type: number
        todayRevenue:
          type: number

    TimeseriesPoint:
      type: object
      required: [date, revenue, count]
      properties:
        date:
          type: string
          format: date
        revenue:
          type: number
        count:
          type: integer
