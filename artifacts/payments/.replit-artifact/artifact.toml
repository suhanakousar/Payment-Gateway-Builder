kind = "web"
previewPath = "/"
title = "PayLite Dashboard"
version = "1.0.0"
id = "artifacts/payments"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19926

[services.development]
run = "pnpm --filter @workspace/payments run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/payments", "run", "build" ]
publicDir = "artifacts/payments/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19926"
BASE_PATH = "/"
